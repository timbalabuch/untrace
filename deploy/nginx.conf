server {
    listen 80;
    server_name untrace.example.com;   # <-- set your subdomain
    root /var/www/untrace;             # <-- match REMOTE_ROOT in deploy.sh
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
# After the first deploy, enable TLS: certbot --nginx -d untrace.example.com
